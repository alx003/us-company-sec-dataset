name: Refresh SEC Workbooks

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install openpyxl

      - name: Build FedEx workbook
        env:
          SEC_USER_AGENT: "alx003 SEC workbook automation github-actions@users.noreply.github.com"
        run: python scripts/build_company_workbooks.py --ticker FDX --output-dir workbooks

      - name: Commit refreshed workbook
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh SEC workbooks"
          file_pattern: "workbooks/*.xlsx"
